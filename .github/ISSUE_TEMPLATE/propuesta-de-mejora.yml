name: Propuesta de mejora
description: Una idea o algo que echas en falta
labels: ["enhancement"]
body:
  - type: textarea
    id: propuesta
    attributes:
      label: ¿Qué propones?
      description: Describe la mejora o la función que te gustaría tener.
    validations:
      required: true
  - type: textarea
    id: contexto
    attributes:
      label: ¿Qué problema te resolvería?
      description: Cuéntanos tu caso — qué haces hoy y qué te lo pone difícil.
    validations:
      required: false
