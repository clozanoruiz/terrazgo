# Builds the per-platform installers for each v* tag and attaches them to a
# draft release. This workflow ships inside every source snapshot, so each
# release's binaries are built from exactly the source published at its tag —
# check out the tag and you are looking at what the installers were built from.
# Publishing the release (after writing the notes) is a manual step.
#
# Every artifact gets SLSA build provenance (signed into the public Sigstore
# ledger) and each release carries a CycloneDX SBOM attested against the
# installers. Verify any downloaded file with:
#
#   gh attestation verify <file> --repo clozanoruiz/terrazgo
name: Build release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      # tauri (via wry/tao) links against the system webview stack on Linux.
      - name: Install Tauri system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            librsvg2-dev \
            libssl-dev

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # tauri-action runs beforeBuildCommand (npm run build) itself; only the
      # dependencies need installing here.
      - name: Install frontend dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build installers and attach to the draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Terrazgo ${{ github.ref_name }}"
          releaseDraft: true
          # Early versions ship as pre-releases (see the README warning about
          # data not surviving upgrades); drop at the first stable release.
          prerelease: true
          includeUpdaterJson: false

      # Windows also gets a "portable" download: the bare terrazgo.exe, zipped
      # (runs without installing; still needs the WebView2 runtime and keeps
      # its data in the user profile like the installed app). Zipped rather
      # than uploaded as a naked exe so browsers download it without warnings
      # and the filename carries the version.
      - name: Zip the portable build and attach it to the draft release
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $zip = "terrazgo_${version}_x64_portable.zip"
          Compress-Archive -Path target/release/terrazgo.exe -DestinationPath $zip
          # --clobber keeps a re-tagged run idempotent.
          gh release upload $env:GITHUB_REF_NAME $zip --clobber

      # Attestation subjects are matched by digest, so any rename tauri-action
      # applies when uploading does not affect verification of the downloaded
      # assets. The portable download is attested as the zip itself — the file
      # a user actually downloads and can point gh attestation verify at.
      - name: Attest build provenance (Linux artifacts)
        if: startsWith(matrix.platform, 'ubuntu')
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb

      - name: Attest build provenance (Windows artifacts)
        if: matrix.platform == 'windows-latest'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            target/release/bundle/nsis/*.exe
            terrazgo_*_portable.zip

  # One SBOM per release, derived from the lockfiles (Cargo.lock +
  # package-lock.json — dev-dependencies included, that is the lockfile
  # granularity), attached as a release asset and attested against the
  # installers built above.
  sbom:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate the CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: terrazgo-${{ github.ref_name }}.cdx.json
          upload-artifact: false
          upload-release-assets: false

      # Downloaded before the SBOM is uploaded, so the glob below is exactly
      # the set of installers.
      - name: Download the installers from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "$GITHUB_REF_NAME" --dir assets

      # actions/attest-sbom is deprecated; actions/attest detects SBOM mode
      # from sbom-path and emits the same CycloneDX attestation.
      - name: Attest the SBOM against the installers
        uses: actions/attest@v4
        with:
          subject-path: assets/*
          sbom-path: terrazgo-${{ github.ref_name }}.cdx.json

      - name: Attach the SBOM to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # --clobber keeps a re-tagged run idempotent.
        run: gh release upload "$GITHUB_REF_NAME" "terrazgo-${GITHUB_REF_NAME}.cdx.json" --clobber
